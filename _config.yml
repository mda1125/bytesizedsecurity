title: "ByteSizedSecurity"
description: "Cybersecurity Insights & Analysis - Providing in-depth analysis on the latest security threats, vulnerabilities, and defense mechanisms."
url: "https://blog.bytesizedsecurity.show"

# Author (used by jekyll-seo-tag for BlogPosting author schema)
author:
  name: "Marc David"
  twitter: "marc_david"
  url: "https://blog.bytesizedsecurity.show/about/"

# Publisher logo used by jekyll-seo-tag for JSON-LD (must be ≥ 112×112)
logo: "/assets/img/bytesizedsecurity-logo-600x60.png"

# Social media usernames
email: "marc@bytesizedsecurity.show"
twitter_username: "marc_david"
github_username: "mda1125"
linkedin_username: "marccdavid"
youtube_username: "@ByteSizedSecurity"

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"
permalink: /:year/:month/:day/:title/

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - SECURITY.md
  - node_modules
  - package.json
  - package-lock.json
  - assets/css/input.css

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
      category: "Security"
      image: "/favicon-96x96.png"
