title: "ByteSizedSecurity"
description: "Cybersecurity Insights & Analysis - Providing in-depth analysis on the latest security threats, vulnerabilities, and defense mechanisms."
url: "https://blog.bytesizedsecurity.show"

# Author
author:
  name: "Marc David"
  credentials: "CISSP"
  title: "Senior Security Engineer"
  # Optional one-liner shown next to the title in the homepage author proof strip.
  # Leave empty to show only `title`. Keep it short (≤60 chars) and verifiable.
  tagline: ""
  avatar: "/assets/img/marc-david-avatar.webp"
  twitter: "marc_david"
  url: "https://blog.bytesizedsecurity.show/about/"
  # Third-party verification of the CISSP credential — surfaced in the
  # post-footer About the Author block as a verifiable authority signal.
  credly: "https://www.credly.com/users/marcdavid"
  # 2–3 line bio shown in the post-footer About the Author block. Keep the
  # voice distinct from the top byline (story, not credential checklist).
  bio: "Marc has spent 8+ years in threat detection, incident response, and security automation. ByteSizedSecurity is his independent take — practitioner-written, no vendor sponsorships, no rewritten press releases."

logo: "/assets/img/bytesizedsecurity-logo-600x60.png"

# Social media usernames
email: "marc@bytesizedsecurity.show"
twitter_username: "marc_david"
github_username: "mda1125"
linkedin_username: "marccdavid"
youtube_username: "@ByteSizedSecurity"
tiktok_username: "@bytesizedsecurity"

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"
permalink: /:year/:month/:day/:title/
future: true

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-last-modified-at

exclude:
  - SECURITY.md
  - node_modules
  - package.json
  - package-lock.json
  - assets/css/input.css
  - scripts

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
      category: "Security"
      image: "/assets/img/default-og.png"
