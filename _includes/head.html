<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BFZKE874XE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-BFZKE874XE');
  </script>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/favicon-96x96.png' | relative_url }}" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" />
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}" />
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />
  
  <!-- Begin SEO (JSON-LD disabled — hand-authored schema in schema-blogposting.html) -->
  {% seo json_ld=false %}
  <!-- End SEO -->

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS (compiled) -->
  <link rel="stylesheet" href="{{ '/assets/css/tailwind.min.css' | relative_url }}">

  {% if page.image %}
  <!-- Preload LCP hero image -->
  {% if page.image contains '://' %}
  <link rel="preload" as="image" href="{{ page.image }}" fetchpriority="high">
  {% else %}
  <link rel="preload" as="image" href="{{ page.image | relative_url }}" fetchpriority="high">
  {% endif %}
  {% endif %}

  {% feed_meta %}

  {% if jekyll.environment == 'production' and site.google_analytics -%}
  <!-- Begin Google Analytics -->
  {% include google-analytics.html %}
  <!-- End Google Analytics -->
  {%- endif %}

  {% if page.layout == 'post' %}
  <!-- highlight.js — only loaded on post pages -->
  <link rel="stylesheet" href="{{ '/js/highlightjs/styles/github.css' | relative_url }}">
  <script defer src="{{ '/js/highlightjs/highlight.min.js' | relative_url }}"></script>
  <script defer src="{{ '/js/highlightjs/languages/plaintext.min.js' | relative_url }}"></script>
  <script defer src="{{ '/js/highlightjs/languages/powershell.min.js' | relative_url }}"></script>
  <script defer src="{{ '/js/highlightjs/languages/tsql.min.js' | relative_url }}"></script>
  <script defer>document.addEventListener('DOMContentLoaded', function() { hljs.highlightAll(); });</script>
  {% endif %}
</head>
