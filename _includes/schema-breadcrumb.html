{%- comment -%}
  Use `jsonify` (not `escape`) so titles like "Don't" or "AI & Privacy" emit clean
  JSON strings instead of leaking HTML entities (&#39;, &amp;) into BreadcrumbList.
{%- endcomment -%}
{% assign bc_category = page.category | default: page.tags | first | default: 'Security' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ bc_category | jsonify }},
      "item": "{{ site.url }}/archive/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | jsonify }},
      "item": "{{ page.url | absolute_url }}"
    }
  ]
}
</script>
