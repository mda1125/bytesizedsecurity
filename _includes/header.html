<header class="bg-white border-b-4 border-primary pt-6 pb-6 px-4 lg:px-8 shadow-sm">
  <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-3 no-underline">
      <div class="flex items-center justify-center text-primary">
        <span class="material-symbols-outlined text-4xl">shield_lock</span>
      </div>
      <div class="flex flex-col">
        <span class="text-2xl md:text-3xl font-black tracking-tight text-gray-900 font-sans uppercase">{{ site.title }}</span>
        <span class="text-xs md:text-sm text-gray-500 font-sans tracking-widest uppercase">Cybersecurity Insights &amp; Analysis</span>
      </div>
    </a>

    <!-- Mobile hamburger button -->
    <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center w-11 h-11 text-gray-700 hover:text-primary transition-colors" aria-label="Toggle menu">
      <span class="material-symbols-outlined text-3xl" id="menu-icon">menu</span>
    </button>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-6 font-sans text-sm font-bold uppercase tracking-wide text-gray-600">
      <a class="py-2 hover:text-primary hover:underline transition-colors" href="{{ '/' | relative_url }}">Home</a>
      <a class="py-2 hover:text-primary hover:underline transition-colors" href="{{ '/about' | relative_url }}">About</a>
      <a class="py-2 hover:text-primary hover:underline transition-colors" href="{{ '/archive' | relative_url }}">Archives</a>
      <a class="py-2 hover:text-primary hover:underline transition-colors" href="{{ '/contact' | relative_url }}">Contact</a>
      <a class="py-2 flex items-center gap-1 hover:text-primary hover:underline transition-colors" href="https://bytesizedsecurity.show/" target="_blank" rel="noopener">
        <span class="material-symbols-outlined text-[18px]">podcasts</span> Podcast
      </a>
      <a class="py-2 flex items-center gap-1 text-primary" href="{{ '/feed.xml' | relative_url }}">
        <span class="material-symbols-outlined text-[18px]">rss_feed</span> RSS
      </a>
    </nav>
  </div>

  <!-- Mobile nav dropdown -->
  <nav id="mobile-menu" class="hidden md:hidden max-w-6xl mx-auto mt-4 pt-4 border-t border-gray-200">
    <div class="flex flex-col font-sans text-sm font-bold uppercase tracking-wide text-gray-600">
      <a class="py-3 hover:text-primary hover:underline transition-colors" href="{{ '/' | relative_url }}">Home</a>
      <a class="py-3 hover:text-primary hover:underline transition-colors" href="{{ '/about' | relative_url }}">About</a>
      <a class="py-3 hover:text-primary hover:underline transition-colors" href="{{ '/archive' | relative_url }}">Archives</a>
      <a class="py-3 hover:text-primary hover:underline transition-colors" href="{{ '/contact' | relative_url }}">Contact</a>
      <a class="py-3 flex items-center gap-1 hover:text-primary hover:underline transition-colors" href="https://bytesizedsecurity.show/" target="_blank" rel="noopener">
        <span class="material-symbols-outlined text-[18px]">podcasts</span> Podcast
      </a>
      <a class="py-3 flex items-center gap-1 text-primary" href="{{ '/feed.xml' | relative_url }}">
        <span class="material-symbols-outlined text-[18px]">rss_feed</span> RSS
      </a>
    </div>
  </nav>
</header>

<script>
  document.getElementById('mobile-menu-btn').addEventListener('click', function() {
    var menu = document.getElementById('mobile-menu');
    var icon = document.getElementById('menu-icon');
    menu.classList.toggle('hidden');
    icon.textContent = menu.classList.contains('hidden') ? 'menu' : 'close';
  });
</script>
